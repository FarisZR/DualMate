name: dualmate
description: An app for the DHBW Stuttgart

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 2.0.0-beta+39

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.38.4"

dependencies:
  sentry_flutter: ^9.20.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # cupertino_icons: ^1.0.0
  intl: ^0.20.2
  html: ^0.15.6
  http: ^1.6.0
  sqflite: ^2.4.2+1
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  property_change_notifier: ^0.5.0
  http_client_helper: ^3.0.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  kiwi: ^5.0.1
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.9.0+3
  in_app_review: ^2.0.12
  flutter_secure_storage: ^10.2.0
  animations: ^2.2.0
  mutex: ^3.1.0
  device_calendar: ^4.3.3
  flutter_widgetkit: ^1.0.3
  flutter_app_group_directory: ^1.1.0
  timezone: ^0.9.4
  dualmate_widget_bridge:
    path: third_party/dualmate_widget_bridge

dev_dependencies:
  sentry_dart_plugin: ^3.3.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  test: ^1.29.0

dependency_overrides:
  win32: ^6.2.0
  path_provider_android:
    path: third_party/path_provider_android




# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/empty_state.png
    - assets/app_icon.png
    - assets/onboarding_bottom_background.png
    - assets/onboarding_bottom_foreground.png
    - assets/onboarding_bottom_background_dark.png
    - assets/onboarding_bottom_foreground_dark.png
    - assets/schedule_empty_state.png
    - assets/schedule_empty_state_dark.png

  fonts:
    - family:  CustomIcons
      fonts:
        - asset: fonts/CustomIcons.ttf

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: dualmate
  org: fariszr
