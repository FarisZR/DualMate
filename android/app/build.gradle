plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'dev.flutter.flutter-gradle-plugin'
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '39'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '2.0-beta'
}

def getGitCommitHash() {
    try {
        def stdout = new ByteArrayOutputStream()
        exec {
            commandLine 'git', 'rev-parse', '--short', 'HEAD'
            standardOutput = stdout
        }
        return stdout.toString().trim()
    } catch (ignored) {
        return 'unknown'
    }
}

def getBuildDate() {
    return new Date().format('yyyyMMdd')
} 

def getDartDefine(String name, String defaultValue) {
    def dartDefines = project.findProperty('dart-defines')
    if (dartDefines == null || dartDefines.isEmpty()) {
        return defaultValue
    }

    for (encodedDefine in dartDefines.split(',')) {
        if (encodedDefine.isEmpty()) {
            continue
        }
        def decodedDefine = new String(
                java.util.Base64.decoder.decode(encodedDefine),
                'UTF-8'
        )
        def separatorIndex = decodedDefine.indexOf('=')
        if (separatorIndex > 0 && decodedDefine.substring(0, separatorIndex) == name) {
            return decodedDefine.substring(separatorIndex + 1)
        }
    }

    return defaultValue
}

def enableLocalCalendarFeature =
        getDartDefine('DUALMATE_ENABLE_LOCAL_CALENDAR', 'false').toBoolean()

def sourceMainManifestFile = file('src/main/AndroidManifest.xml')
def generatedMainManifestFile = layout.buildDirectory
        .file('generated/conditionalManifest/AndroidManifest.xml')
        .get()
        .asFile

def writeConditionalMainManifest = {
    generatedMainManifestFile.parentFile.mkdirs()

    if (!enableLocalCalendarFeature) {
        generatedMainManifestFile.setText(
                sourceMainManifestFile.getText('UTF-8'),
                'UTF-8'
        )
        return
    }

    def manifest = new groovy.xml.XmlParser(false, false).parse(
            sourceMainManifestFile
    )
    [
            'android.permission.READ_CALENDAR',
            'android.permission.WRITE_CALENDAR'
    ].each { permissionName ->
        def permissionExists = manifest.'uses-permission'.any { permission ->
            permission.attributes()['android:name'] == permissionName
        }

        if (!permissionExists) {
            manifest.appendNode('uses-permission', ['android:name': permissionName])
        }
    }

    def manifestText = groovy.xml.XmlUtil.serialize(manifest)
    generatedMainManifestFile.setText(manifestText, 'UTF-8')
}

writeConditionalMainManifest()

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.fariszr.dualmate"
    compileSdkVersion 36

    ndkVersion flutter.ndkVersion

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        main.manifest.srcFile generatedMainManifestFile
    }

    lint {
        disable 'InvalidPackage'
        // FlutterActivity extends android.app.Activity but lint cannot resolve
        // the Flutter embedding class hierarchy during lintVitalRelease on AGP 9.
        disable 'Instantiatable'
    }

    defaultConfig {
        applicationId "com.fariszr.dualmate"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        multiDexEnabled true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        debug {
            versionNameSuffix "-${getBuildDate()}-${getGitCommitHash()}"
        }
        release {
            signingConfig signingConfigs.release
            //signingConfig signingConfigs.debug
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
    testImplementation 'junit:junit:4.13.1'

    androidTestImplementation 'androidx.test:runner:1.3.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.3.0'

    implementation 'com.jakewharton.threetenabp:threetenabp:1.3.0'
}
